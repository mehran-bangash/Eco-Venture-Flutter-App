<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: Bridge Builder Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --grass: #4CAF50;
            --water: #2196F3;
            --wood: #8B4513;
            --accent: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            background: var(--sky);
        }

        /* Adventure World */
        #world {
            position: relative;
            width: 100%;
            height: 55%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            overflow: hidden;
        }

        .cloud {
            position: absolute; background: white; border-radius: 50px; opacity: 0.8;
            animation: moveClouds linear infinite;
        }
        @keyframes moveClouds {
            from { transform: translateX(-150px); }
            to { transform: translateX(100vw); }
        }

        .sun {
            position: absolute; top: 30px; right: 40px;
            width: 60px; height: 60px; background: #FFD700;
            border-radius: 50%; box-shadow: 0 0 40px #FFD700;
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .island {
            position: absolute; bottom: 0;
            height: 140px; background: var(--grass);
            border-top: 10px solid #388E3C;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 2;
        }

        #island-1 { left: 0; width: 35%; border-radius: 0 60px 0 0; }
        #island-2 { right: 0; width: 35%; border-radius: 60px 0 0 0; }

        #water {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 70px; background: var(--water); z-index: 1;
        }

        /* Bridge Area */
        #bridge-container {
            position: absolute; bottom: 90px; left: 35%; width: 30%;
            height: 18px; z-index: 5;
        }
        #bridge {
            width: 0%; height: 100%; background: var(--wood);
            border-radius: 8px; transition: width 1s cubic-bezier(0.47, 0, 0.745, 0.715);
            border-bottom: 5px solid #5D2E0A;
        }

        /* Result floating on bridge */
        #bridge-label {
            position: absolute; top: -45px; left: 50%;
            transform: translateX(-50%) scale(0);
            background: white; padding: 5px 15px; border-radius: 12px;
            font-weight: bold; font-size: 20px; color: #4B41DA;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        #hero {
            position: absolute; bottom: 135px; left: 10%;
            font-size: 55px; z-index: 10;
            transition: all 1s ease-in-out;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.2));
            transform: scaleX(-1);
        }

        .walking { animation: walk-cycle 0.4s infinite; }
        @keyframes walk-cycle {
            0% { transform: translateY(0) rotate(0deg) scaleX(-1); }
            50% { transform: translateY(-12px) rotate(-8deg) scaleX(-1); }
            100% { transform: translateY(0) rotate(0deg) scaleX(-1); }
        }

        /* UI Panel */
        #ui-layer {
            height: 45%; background: #F8FAFC;
            padding: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-top: 6px solid #CBD5E1;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .problem-bubble {
            background: white; padding: 10px 40px;
            border-radius: 24px; border: 4px solid #E2E8F0;
            font-size: 32px; font-weight: 800; margin-bottom: 10px;
            color: #1E293B; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; gap: 10px; align-items: center;
        }

        .ans-placeholder {
            color: #4B41DA; min-width: 40px; text-align: center;
            border-bottom: 3px solid #E2E8F0;
        }

        .keypad {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 8px; width: 100%; max-width: 450px;
        }

        .btn {
            background: white; border: 2px solid #E2E8F0; padding: 12px;
            border-radius: 16px; font-size: 18px; font-weight: 800;
            color: #334155; cursor: pointer; box-shadow: 0 4px 0 #E2E8F0;
            transition: all 0.1s;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E2E8F0; background: #F1F5F9; }
        .btn-ok { background: #10B981; color: white; border-color: #059669; box-shadow: 0 4px 0 #047857; grid-column: span 2; }
        .btn-clear { background: #EF4444; color: white; border-color: #DC2626; box-shadow: 0 4px 0 #B91C1C; }

        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            display: none; justify-content: center; align-items: center; z-index: 500;
        }
        .win-card {
            background: white; padding: 30px; border-radius: 30px;
            text-align: center; max-width: 320px;
        }
    </style>
</head>
<body>

<div id="world">
    <div class="sun"></div>
    <div class="cloud" style="top: 20px; width: 100px; height: 30px; animation-duration: 25s;"></div>

    <div id="island-1" class="island"></div>
    <div id="bridge-container">
        <div id="bridge-label">?</div>
        <div id="bridge"></div>
    </div>
    <div id="island-2" class="island"></div>
    <div id="water"></div>
    <div id="hero">🏃</div>
</div>

<div id="ui-layer">
    <div class="problem-bubble">
        <span id="equation-left">11 + 4</span>
        <span>=</span>
        <span id="equation-ans" class="ans-placeholder">?</span>
    </div>

    <div class="keypad">
        <button class="btn" onclick="add('1')">1</button>
        <button class="btn" onclick="add('2')">2</button>
        <button class="btn" onclick="add('3')">3</button>
        <button class="btn" onclick="add('4')">4</button>
        <button class="btn" onclick="add('5')">5</button>
        <button class="btn" onclick="add('6')">6</button>
        <button class="btn" onclick="add('7')">7</button>
        <button class="btn" onclick="add('8')">8</button>
        <button class="btn" onclick="add('9')">9</button>
        <button class="btn" onclick="add('0')">0</button>
        <button class="btn btn-clear" onclick="clr()">C</button>
        <button class="btn btn-ok" onclick="verify()">CROSS BRIDGE</button>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="win-card">
        <div style="font-size: 60px; margin-bottom: 10px;">🌟</div>
        <h2>Well Done!</h2>
        <p id="win-msg">You solved it! Ready for the next island?</p>
        <button onclick="nextLvl()" style="background: #4B41DA; color: white; border: none; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%;">CONTINUE</button>
    </div>
</div>

<script>
    let currentLevel = 1, targetAns = 0, currentInput = "";
    const hero = document.getElementById('hero');
    const bridge = document.getElementById('bridge');
    const bridgeLabel = document.getElementById('bridge-label');
    const eqAns = document.getElementById('equation-ans');
    const eqLeft = document.getElementById('equation-left');

    function generateProblem() {
        let a, b, op;
        // Level Progression: Varying Challenges
        if (currentLevel === 1) {
            a = Math.floor(Math.random() * 10) + 5;
            b = Math.floor(Math.random() * 5) + 1;
            op = "+";
        } else if (currentLevel === 2) {
            a = Math.floor(Math.random() * 20) + 10;
            b = Math.floor(Math.random() * 10) + 1;
            op = "-"; // Introduces Subtraction
        } else if (currentLevel === 3) {
            a = Math.floor(Math.random() * 5) + 2;
            b = Math.floor(Math.random() * 5) + 2;
            op = "×"; // Introduces Multiplication
        } else {
            a = Math.floor(Math.random() * 25) + 15;
            b = Math.floor(Math.random() * 15) + 5;
            op = (Math.random() > 0.5) ? "+" : "-";
        }

        targetAns = (op === "+") ? a + b : (op === "-") ? a - b : a * b;
        eqLeft.innerText = `${a} ${op} ${b}`;
        currentInput = "";
        updateUI();
    }

    function add(num) {
        if (currentInput.length < 3) currentInput += num;
        updateUI();
    }

    function clr() {
        currentInput = "";
        updateUI();
    }

    function updateUI() {
        const display = currentInput === "" ? "?" : currentInput;
        eqAns.innerText = display;
        bridgeLabel.innerText = display;

        // Show label on bridge when typing
        if (currentInput !== "") {
            bridgeLabel.style.transform = "translateX(-50%) scale(1)";
        } else {
            bridgeLabel.style.transform = "translateX(-50%) scale(0)";
        }
    }

    function verify() {
        if (currentInput === "") return;

        if (parseInt(currentInput) === targetAns) {
            solveSuccess();
        } else {
            shakeEffect();
        }
    }

    function solveSuccess() {
        bridge.style.width = "100%";
        setTimeout(() => {
            hero.classList.add('walking');
            hero.style.left = "75%";
            setTimeout(() => {
                hero.classList.remove('walking');
                document.getElementById('overlay').style.display = 'flex';
                window.GameChannel?.postMessage(JSON.stringify({
                    score: 100, level: currentLevel, status: 'level_up'
                }));
            }, 1100);
        }, 500);
    }

    function shakeEffect() {
        hero.style.transition = "none";
        hero.style.transform = "translateX(10px) scaleX(-1)";
        setTimeout(() => hero.style.transform = "translateX(-10px) scaleX(-1)", 80);
        setTimeout(() => {
            hero.style.transform = "translateX(0) scaleX(-1)";
            hero.style.transition = "all 1s ease-in-out";
        }, 160);
        eqAns.style.color = "#EF4444";
        setTimeout(() => { eqAns.style.color = "#4B41DA"; clr(); }, 800);
    }

    function nextLvl() {
        currentLevel++;
        document.getElementById('overlay').style.display = 'none';
        bridge.style.transition = 'none';
        bridge.style.width = '0';
        hero.style.transition = 'none';
        hero.style.left = '10%';
        setTimeout(() => {
            bridge.style.transition = 'width 1s ease';
            hero.style.transition = 'all 1s ease-in-out';
            generateProblem();
        }, 100);
    }

    window.setStartingLevel = (l) => { currentLevel = l; generateProblem(); };
    generateProblem();
</script>
</body>
</html>
