<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoVenture - Pro Drag & Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --plastic: #03A9F4; --paper: #FF9800; --organic: #4CAF50; --metal: #607D8B;
            --primary: #2E7D32; --accent: #00BFA5; --danger: #FF5252;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #F0F4F8 0%, #E8F5E9 100%);
            margin: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Stats Bar */
        .stats {
            width: 90%; margin-top: 15px; padding: 12px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 20px; display: flex; justify-content: space-around;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05); z-index: 100;
        }
        .stat-v { font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 700; color: var(--primary); }
        .stat-l { font-size: 9px; text-transform: uppercase; color: #666; font-weight: 700; }

        #game-stage {
            flex: 1; width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 20px 0;
            position: relative;
        }

        /* Feedback Popup */
        #feedback-box {
            position: absolute; top: 20%; transform: scale(0);
            padding: 10px 25px; border-radius: 50px; background: white;
            font-weight: 800; font-size: 18px; z-index: 200;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Draggable Card */
        #item-card {
            width: 120px; height: 120px; background: white; border-radius: 30px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 4px solid white;
            cursor: grab; position: relative; z-index: 50;
            touch-action: none; user-select: none;
            will-change: transform;
        }
        .item-icon { font-size: 50px; pointer-events: none; }
        .item-name { font-weight: 700; font-size: 13px; margin-top: 5px; color: #333; pointer-events: none; }

        /* 3D Bin Styling */
        .bins-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 85%;
        }
        .bin-box {
            position: relative; height: 100px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end; perspective: 1000px;
            pointer-events: all;
        }
        .bin-body {
            width: 100%; height: 75px; border-radius: 10px 10px 25px 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 11px; position: relative;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: none;
        }
        .bin-mouth {
            position: absolute; top: -8px; width: 110%; height: 22px;
            background: rgba(0,0,0,0.1); border-radius: 50%; border: 3px solid rgba(255,255,255,0.4);
            z-index: -1; pointer-events: none;
        }
        .bin-label { margin-top: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); pointer-events: none; }

        .organic .bin-body { background: var(--organic); }
        .plastic .bin-body { background: var(--plastic); }
        .paper .bin-body { background: var(--paper); }
        .metal .bin-body { background: var(--metal); }

        /* Hover State */
        .bin-hover .bin-body {
            transform: scale(1.08);
            box-shadow: 0 0 25px white, 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; color: white; z-index: 1000;
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

        .success-flash { animation: successFlash 0.5s; }
        @keyframes successFlash {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.5); }
            100% { transform: scale(0); filter: brightness(1); }
        }
    </style>
</head>
<body>

<div class="stats">
    <div class="stat-box"><div class="stat-l">Mission</div><div class="stat-v" id="lvl-val">01</div></div>
    <div class="stat-box"><div class="stat-l">Score</div><div class="stat-v" id="score-val">000</div></div>
    <div class="stat-box"><div class="stat-l">Progress</div><div class="stat-v" id="prog-val">0%</div></div>
</div>

<div id="game-stage">
    <div id="feedback-box">CORRECT! ✨</div>

    <div id="item-card">
        <div class="item-icon" id="item-icon">🍎</div>
        <div class="item-name" id="item-name">Apple Core</div>
    </div>

    <div class="bins-grid">
        <div class="bin-box organic" id="bin-organic">
            <div class="bin-mouth"></div>
            <div class="bin-body"><span class="bin-label">ORGANIC</span></div>
        </div>
        <div class="bin-box plastic" id="bin-plastic">
            <div class="bin-mouth"></div>
            <div class="bin-body"><span class="bin-label">PLASTIC</span></div>
        </div>
        <div class="bin-box paper" id="bin-paper">
            <div class="bin-mouth"></div>
            <div class="bin-body"><span class="bin-label">PAPER</span></div>
        </div>
        <div class="bin-box metal" id="bin-metal">
            <div class="bin-mouth"></div>
            <div class="bin-body"><span class="bin-label">METAL</span></div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div style="background:white; color:#333; padding:30px; border-radius:30px; text-align:center; width:80%;">
        <div style="font-size:60px;">🌟</div>
        <h2>Mission Clear!</h2>
        <p>You are a recycling master!</p>
        <button onclick="nextLvl()" style="background:var(--primary); color:white; border:none; padding:15px; border-radius:20px; width:100%; font-weight:bold;">CONTINUE</button>
    </div>
</div>

<script>
    const levels = [
        { items: [{ n: 'Apple Core', i: '🍎', c: 'organic' }, { n: 'Water Bottle', i: '🥤', c: 'plastic' }, { n: 'Paper Box', i: '📦', c: 'paper' }] },
        { items: [{ n: 'Banana', i: '🍌', c: 'organic' }, { n: 'Soda Can', i: '🥫', c: 'metal' }, { n: 'Newspaper', i: '📰', c: 'paper' }] }
    ];

    let curLvl = 0, curItem = 0, score = 0;
    const card = document.getElementById('item-card');
    const feedback = document.getElementById('feedback-box');
    let isDragging = false, startX, startY;

    window.setStartingLevel = (l) => { curLvl = (l > levels.length || l <= 0) ? 0 : l - 1; render(); };

    function showFeedback(text, color) {
        feedback.innerText = text;
        feedback.style.color = color;
        feedback.style.transform = 'scale(1)';
        setTimeout(() => { feedback.style.transform = 'scale(0)'; }, 1000);
    }

    function render() {
        const item = levels[curLvl].items[curItem];
        document.getElementById('item-icon').innerText = item.i;
        document.getElementById('item-name').innerText = item.n;
        document.getElementById('lvl-val').innerText = (curLvl + 1).toString().padStart(2, '0');
        document.getElementById('score-val').innerText = score.toString().padStart(3, '0');
        document.getElementById('prog-val').innerText = Math.round((curItem / levels[curLvl].items.length) * 100) + "%";
        card.style.transform = `translate(0px, 0px)`;
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
    }

    card.onpointerdown = (e) => {
        isDragging = true;
        const rect = card.getBoundingClientRect();
        // Store offset of pointer from center of card for smoother drag
        startX = e.clientX;
        startY = e.clientY;
        card.setPointerCapture(e.pointerId);
        card.style.cursor = 'grabbing';
        card.style.zIndex = '1000';
    };

    card.onpointermove = (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/15}deg)`;

        // --- Real-time Hover Detection ---
        // Temporarily hide card from hit testing to see what's underneath
        card.style.pointerEvents = 'none';
        const under = document.elementFromPoint(e.clientX, e.clientY);
        card.style.pointerEvents = 'auto';

        // Clear previous highlights
        document.querySelectorAll('.bin-box').forEach(b => b.classList.remove('bin-hover'));

        if (under) {
            const bin = under.closest('.bin-box');
            if (bin) bin.classList.add('bin-hover');
        }
    };

    card.onpointerup = (e) => {
        if (!isDragging) return;
        isDragging = false;
        card.releasePointerCapture(e.pointerId);
        card.style.zIndex = '50';

        // Remove any remaining highlights
        document.querySelectorAll('.bin-box').forEach(b => b.classList.remove('bin-hover'));

        // Check what's under the release point
        card.style.pointerEvents = 'none'; // Essential to see bin below
        const dropElement = document.elementFromPoint(e.clientX, e.clientY);
        const dropTarget = dropElement ? dropElement.closest('.bin-box') : null;

        if (dropTarget) {
            const category = dropTarget.id.split('-')[1];
            check(category);
        } else {
            card.style.pointerEvents = 'auto';
            card.style.transform = `translate(0px, 0px)`;
        }
    };

    function check(cat) {
        const correct = levels[curLvl].items[curItem].c;
        if (cat === correct) {
            score += 25; curItem++;
            card.classList.add('success-flash');
            showFeedback("EXCELLENT! ✨", "var(--organic)");

            setTimeout(() => {
                card.classList.remove('success-flash');
                if (curItem >= levels[curLvl].items.length) {
                    document.getElementById('overlay').style.display = 'flex';
                    window.GameChannel?.postMessage(JSON.stringify({
                        score: score,
                        level: curLvl + 1,
                        status: curLvl < levels.length - 1 ? 'level_up' : 'completed'
                    }));
                } else {
                    render();
                }
            }, 500);
        } else {
            score = Math.max(0, score - 10);
            card.style.pointerEvents = 'auto';
            card.classList.add('shake');
            showFeedback("TRY AGAIN! ❌", "var(--danger)");

            setTimeout(() => {
                card.classList.remove('shake');
                card.style.transform = `translate(0px, 0px)`;
                document.getElementById('score-val').innerText = score.toString().padStart(3, '0');
            }, 400);
        }
    }

    function nextLvl() {
        if (curLvl < levels.length - 1) {
            curLvl++; curItem = 0;
        } else {
            curLvl = 0; curItem = 0; score = 0;
        }
        document.getElementById('overlay').style.display = 'none';
        render();
    }

    // Initialize
    render();
</script>
</body>
</html>
